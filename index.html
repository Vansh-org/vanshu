<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Vanshu ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            overflow: hidden;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .subtitle {
            font-size: 0.85rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .birthday-wish {
            font-size: 1.25rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #fff;
            font-size: 1.9rem;
            margin-bottom: 25px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.15);
            line-height: 1.3;
            font-weight: 700;
        }

        .proposal-img {
            width: 100%;
            max-width: 270px;
            height: auto;
            border-radius: 20px;
            border: 6px solid #ffb3a7;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            margin: 0 auto 30px auto;
            display: block;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px; 
            margin-top: 10px;
            min-height: 55px;
            width: 100%;
        }

        button {
            padding: 12px 38px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #yesBtn {
            background-color: #ffffff;
            color: #ff4757;
            order: 1; 
        }

        #yesBtn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.5);
        }

        #noBtn {
            background-color: #ff4757;
            color: #ffffff;
            order: 2; 
        }
    </style>
</head>
<body>

    <div class="card">
        <p class="subtitle">From Your Favourite Person 💝</p>
        <p class="birthday-wish">✨ Happy Birthday, Vanshu! ✨</p>
        <h1>Will you forever be mine and be my girlfriend? 👑</h1>
        
        <!-- Guaranteed Permanent CDN link for the Cat Image -->
        <img src="cat-rose.jpg">
        
        <div class="btn-container">
            <button id="yesBtn" onclick="celebrate()">Yes 💖</button>
            <button id="noBtn" onmouseenter="swapButtons()" onpointerenter="swapButtons()">No 😢</button>
        </div>
    </div>

    <script>
        function swapButtons() {
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            
            const yesOrder = window.getComputedStyle(yesBtn).order;
            
            if (yesOrder === "1") {
                yesBtn.style.order = "2";
                noBtn.style.order = "1";
            } else {
                yesBtn.style.order = "1";
                noBtn.style.order = "2";
            }
        }

        function celebrate() {
            window.location.href = 'success.html';
        }
    </script>
</body>
        </html>
